name: Build with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    uses: openmrs/openmrs-contrib-gha-workflows/.github/workflows/build-backend-module.yml@main
    with:
      java_versions: '[8, 11, 17, 21]'
      main_java_version: '8'
      maven_args: 'clean verify -P integration-test'
    secrets:
      MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
      MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  test:
    name: Run e2e tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 8
      - uses: actions/download-artifact@v4
        with:
          name: build_artifact
          path: ${{ github.workspace }}/omod/target
      - name: run db and web containers
        run: |
          docker compose -f docker/docker-compose-refqa.yml up -d
      - name: wait for openmrs instance to start
        run: while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost:8080/openmrs/login.htm)" != "200" ]]; do sleep 1; done
      - name: Run End to End tests
        run: mvn verify --batch-mode -P e2e-test --file pom.xml
      - name: Stop db and web containers
        if: always()
        run: docker compose -f "docker/docker-compose-refqa.yml" down
